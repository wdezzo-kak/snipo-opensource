<!DOCTYPE html>
<html>
	<head>
		<title>Snipo</title>
	</head>
	<style>
		body {
			border: 0;
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			display: block !important;
			overflow: hidden !important;
			visibility: visible !important;
		}

		iframe {
			border: 0;
			margin: 0;
			padding: 0;
			position: absolute;
		}
	</style>
	<body>
		<iframe
			allow="clipboard-read; clipboard-write"
			frameborder="0"
			width="100%"
			height="100%"
			scrolling="auto"
		></iframe>
	</body>
	<script type="text/javascript" src="/build/sidepanel.js"></script>
</html>
